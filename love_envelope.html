<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter for You 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe6f0 0%, #fff5f7 50%, #ffe6e6 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
        }

        /* Daisy flowers decoration */
        .daisy {
            position: absolute;
            width: 60px;
            height: 60px;
            opacity: 0.8;
        }

        .daisy1 { top: 10%; left: 5%; animation: float 3s ease-in-out infinite; }
        .daisy2 { top: 15%; right: 8%; animation: float 4s ease-in-out infinite; }
        .daisy3 { bottom: 15%; left: 10%; animation: float 3.5s ease-in-out infinite; }
        .daisy4 { bottom: 10%; right: 5%; animation: float 4.5s ease-in-out infinite; }
        .daisy5 { top: 50%; left: 2%; animation: float 3.2s ease-in-out infinite; }
        .daisy6 { top: 50%; right: 2%; animation: float 4.2s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .petal {
            position: absolute;
            width: 12px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0 -14px;
        }

        .petal:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateY(-14px); }
        .petal:nth-child(2) { transform: translate(-50%, -50%) rotate(60deg) translateY(-14px); }
        .petal:nth-child(3) { transform: translate(-50%, -50%) rotate(120deg) translateY(-14px); }
        .petal:nth-child(4) { transform: translate(-50%, -50%) rotate(180deg) translateY(-14px); }
        .petal:nth-child(5) { transform: translate(-50%, -50%) rotate(240deg) translateY(-14px); }
        .petal:nth-child(6) { transform: translate(-50%, -50%) rotate(300deg) translateY(-14px); }

        .center {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffd700;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* Hearts decoration */
        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 24px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .heart1 { top: 20%; left: 15%; animation-delay: 0s; }
        .heart2 { top: 30%; right: 20%; animation-delay: 0.3s; }
        .heart3 { bottom: 25%; left: 20%; animation-delay: 0.6s; }
        .heart4 { bottom: 20%; right: 15%; animation-delay: 0.9s; }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Main envelope container */
        .envelope-wrapper {
            position: relative;
            z-index: 10;
        }

        .envelope {
            width: 350px;
            height: 220px;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border: 2px solid #ff69b4;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3);
            position: relative;
            overflow: visible;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .envelope.opened {
            overflow: visible;
        }

        .envelope:hover {
            box-shadow: 0 15px 50px rgba(255, 105, 180, 0.4);
            transform: translateY(-5px);
        }

        /* Envelope flap */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            transform-origin: top;
            transition: transform 0.6s ease;
            border-bottom: 2px solid #ff1493;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }

        .envelope.opened .flap {
            transform: rotateX(180deg);
            visibility: hidden;
        }

        /* Envelope body */
        .envelope-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fff 0%, #fff9f9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: visible;
        }

        /* Message (inside envelope) */
        .message {
            max-width: 300px;
            color: #333;
            font-size: 16px;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease 0.3s;
            font-weight: 500;
        }

        .envelope.opened .message {
            opacity: 1;
            transform: translateY(0);
        }

        /* Button */
        .btn-container {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .open-btn {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .open-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
        }

        .open-btn:active {
            transform: scale(0.98);
        }

        .envelope.opened .open-btn {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
        }

        /* Decorative elements on envelope */
        .deco-heart {
            position: absolute;
            color: #ff69b4;
            font-size: 12px;
            opacity: 0.6;
        }

        .deco-heart1 { top: 10px; right: 15px; }
        .deco-heart2 { bottom: 10px; left: 15px; }
        .deco-heart3 { top: 50%; left: 10px; transform: translateY(-50%); }

        /* Sparkles animation */
        .sparkle {
            position: absolute;
            color: #ffd700;
            font-size: 14px;
            opacity: 0;
            animation: sparkle 1s ease-in-out forwards;
        }

        @keyframes sparkle {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* Yes/No Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .yes-btn, .no-btn {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
        }

        .no-btn {
            position: fixed;
            transition: all 0.2s ease;
            pointer-events: all;
        }

        .no-btn:hover {
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
        }

        /* Modal/Pop-up */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #fff 0%, #fff9f9 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            max-width: 500px;
            animation: popUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            border: 3px solid #ff69b4;
        }

        @keyframes popUp {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .celebration-text {
            font-size: 48px;
            color: #ff1493;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2);
            animation: bounce 0.6s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .celebration-hearts {
            font-size: 30px;
            margin: 20px 0;
            animation: float 2s ease-in-out infinite;
        }

        .confetti-daisy {
            position: absolute;
            width: 80px;
            height: 80px;
            animation: confetti-fall 3s ease-in infinite;
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(-100px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(500px) rotate(360deg);
            }
        }

        .confetti-petal {
            position: absolute;
            width: 16px;
            height: 32px;
            background: #fff;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0 -18px;
        }

        .confetti-petal:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateY(-18px); }
        .confetti-petal:nth-child(2) { transform: translate(-50%, -50%) rotate(60deg) translateY(-18px); }
        .confetti-petal:nth-child(3) { transform: translate(-50%, -50%) rotate(120deg) translateY(-18px); }
        .confetti-petal:nth-child(4) { transform: translate(-50%, -50%) rotate(180deg) translateY(-18px); }
        .confetti-petal:nth-child(5) { transform: translate(-50%, -50%) rotate(240deg) translateY(-18px); }
        .confetti-petal:nth-child(6) { transform: translate(-50%, -50%) rotate(300deg) translateY(-18px); }

        .confetti-center {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ffd700;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            color: #ff69b4;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2);
            z-index: 5;
        }

        /* Tablet & Landscape */
        @media (max-width: 1024px) {
            body {
                overflow-y: auto;
            }

            .heart {
                font-size: 20px;
            }

            .daisy {
                width: 50px;
                height: 50px;
            }
        }

        /* Tablet */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 20px;
            }

            .container {
                min-height: auto;
                padding: 20px 0;
            }

            .envelope {
                width: 280px;
                height: 180px;
            }

            .envelope-body {
                padding: 15px;
            }

            .title {
                font-size: 24px;
                top: 30px;
            }

            .message {
                font-size: 14px;
                max-width: 250px;
            }

            .daisy {
                width: 45px;
                height: 45px;
            }

            .heart {
                font-size: 18px;
            }

            .yes-btn, .no-btn {
                padding: 10px 20px;
                font-size: 13px;
            }

            .open-btn {
                padding: 10px 25px;
                font-size: 14px;
            }

            .modal-content {
                padding: 30px;
                margin: 20px;
                max-width: 90%;
            }

            .celebration-text {
                font-size: 36px;
            }

            .celebration-hearts {
                font-size: 24px;
            }
        }

        /* Mobile - Medium */
        @media (max-width: 600px) {
            body {
                overflow-y: auto;
                padding: 10px;
            }

            .container {
                min-height: auto;
                padding: 15px 0;
            }

            .envelope {
                width: 260px;
                height: 160px;
                border-radius: 6px;
            }

            .envelope-body {
                padding: 12px;
            }

            .flap {
                height: 45%;
            }

            .title {
                font-size: 20px;
                top: 20px;
            }

            .message {
                font-size: 13px;
                line-height: 1.5;
                max-width: 230px;
            }

            .deco-heart {
                font-size: 10px;
            }

            .daisy {
                width: 35px;
                height: 35px;
                opacity: 0.6;
            }

            .heart {
                font-size: 16px;
            }

            .open-btn {
                padding: 8px 20px;
                font-size: 13px;
                letter-spacing: 0.5px;
            }

            .btn-group {
                gap: 10px;
            }

            .yes-btn, .no-btn {
                padding: 8px 18px;
                font-size: 12px;
                touch-action: manipulation;
            }

            .yes-btn:active {
                transform: scale(0.95);
            }

            .no-btn:hover {
                background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            }

            .modal-content {
                padding: 25px;
                margin: 20px;
                max-width: 85%;
                border-radius: 15px;
            }

            .celebration-text {
                font-size: 32px;
                margin: 15px 0;
            }

            .celebration-hearts {
                font-size: 20px;
                margin: 15px 0;
            }

            .confetti-daisy {
                width: 60px;
                height: 60px;
            }
        }

        /* Mobile - Small */
        @media (max-width: 480px) {
            body {
                overflow-y: auto;
                padding: 5px;
            }

            .container {
                min-height: auto;
                padding: 10px 0;
            }

            .envelope {
                width: 240px;
                height: 150px;
                border: 1.5px solid #ff69b4;
            }

            .envelope-body {
                padding: 10px;
            }

            .title {
                font-size: 18px;
                top: 15px;
                position: fixed;
            }

            .message {
                font-size: 12px;
                line-height: 1.4;
                max-width: 210px;
            }

            .open-btn {
                padding: 7px 18px;
                font-size: 12px;
            }

            .btn-group {
                gap: 8px;
                width: 100%;
                padding: 0 10px;
            }

            .yes-btn, .no-btn {
                padding: 7px 15px;
                font-size: 11px;
                flex: 1;
                max-width: 100px;
            }

            .no-btn {
                position: fixed;
            }

            .heart {
                font-size: 14px;
                display: none;
            }

            .daisy {
                width: 30px;
                height: 30px;
                opacity: 0.5;
            }

            .daisy1 { display: none; }
            .daisy2 { top: 5%; right: 5%; }
            .daisy3 { display: none; }
            .daisy4 { bottom: 5%; right: 5%; }
            .daisy5 { display: none; }
            .daisy6 { display: none; }

            .modal-content {
                padding: 20px;
                margin: 15px;
                max-width: 90%;
                border-radius: 12px;
                max-height: 70vh;
                overflow-y: auto;
            }

            .celebration-text {
                font-size: 28px;
                margin: 10px 0;
            }

            .celebration-hearts {
                font-size: 18px;
                margin: 10px 0;
            }

            .confetti-daisy {
                width: 50px;
                height: 50px;
            }
        }

        /* Mobile - Extra Small */
        @media (max-width: 380px) {
            .envelope {
                width: 220px;
                height: 140px;
            }

            .message {
                font-size: 11px;
                max-width: 190px;
            }

            .title {
                font-size: 16px;
                top: 12px;
            }

            .yes-btn, .no-btn {
                padding: 6px 12px;
                font-size: 10px;
            }

            .open-btn {
                padding: 6px 15px;
                font-size: 11px;
            }

            .modal-content {
                padding: 15px;
                margin: 10px;
            }

            .celebration-text {
                font-size: 24px;
            }

            .celebration-hearts {
                font-size: 16px;
            }

            .daisy2 { top: 3%; right: 3%; width: 25px; height: 25px; }
            .daisy4 { bottom: 3%; right: 3%; width: 25px; height: 25px; }
        }
    </style>
</head>
<body>

        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>

    </div>

    <!-- Hearts -->
    <div class="heart heart1">💕</div>
    <div class="heart heart2">💖</div>
    <div class="heart heart3">💗</div>
    <div class="heart heart4">💓</div>

    <!-- Title -->
    <div class="title">💌 Love Letter 💌</div>

    <!-- Container -->
    <div class="container">
        <div class="envelope-wrapper">
            <!-- Envelope -->
            <div class="envelope" id="envelope">
                <!-- Flap -->
                <div class="flap"></div>

                <!-- Body with message and button -->
                <div class="envelope-body">
                    <div class="message">
                        Hi my babiii, I created this for you &lt;3 with Ai's help hehe. I love you always po my babi 💕 Do you love me too my babi?
                    </div>

                    <!-- Decorative hearts on envelope -->
                    <div class="deco-heart deco-heart1">💕</div>
                    <div class="deco-heart deco-heart2">💖</div>
                    <div class="deco-heart deco-heart3">💗</div>

                    <!-- Button -->
                    <div class="btn-container">
                        <button class="open-btn" id="openBtn">Open</button>
                    </div>

                    <!-- Yes/No Buttons (hidden initially) -->
                    <div class="btn-group" id="btnGroup" style="display: none; position: absolute; bottom: 15px;">
                        <button class="yes-btn" id="yesBtn">YES</button>
                        <button class="no-btn" id="noBtn">NO</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const openBtn = document.getElementById('openBtn');
        let isOpened = false;

        openBtn.addEventListener('click', function(e) {
            isOpened = !isOpened;
            
            if (isOpened) {
                envelope.classList.add('opened');
                openBtn.textContent = 'Close';
                createSparkles(e);
            } else {
                envelope.classList.remove('opened');
                openBtn.textContent = 'Open';
            }
        });

        // Create sparkle effect
        function createSparkles(e) {
            const rect = envelope.getBoundingClientRect();
            
            for (let i = 0; i < 12; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.textContent = '✨';
                
                const angle = (i / 12) * Math.PI * 2;
                const distance = 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                sparkle.style.setProperty('--tx', tx + 'px');
                sparkle.style.setProperty('--ty', ty + 'px');
                sparkle.style.left = (rect.left + rect.width / 2) + 'px';
                sparkle.style.top = (rect.top + rect.height / 2) + 'px';
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        // Show Yes/No buttons when envelope is opened
        const originalOpenBtn = openBtn.onclick;
        let btnGroup = document.getElementById('btnGroup');
        let yesBtn = document.getElementById('yesBtn');
        let noBtn = document.getElementById('noBtn');
        let initialOpen = true;

        openBtn.addEventListener('click', function(e) {
            if (initialOpen && isOpened) {
                openBtn.style.display = 'none';
                btnGroup.style.display = 'flex';
            } else if (!isOpened) {
                openBtn.style.display = 'block';
                btnGroup.style.display = 'none';
            }
        });

        // No button - runs away from mouse
        noBtn.addEventListener('mouseenter', function() {
            const randomX = (Math.random() - 0.5) * 150;
            const randomY = (Math.random() - 0.5) * 150;
            
            // Get button dimensions
            const btnRect = noBtn.getBoundingClientRect();
            const btnWidth = btnRect.width;
            const btnHeight = btnRect.height;
            
            // Get viewport dimensions
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            
            // Calculate new position
            let newX = btnRect.left + randomX;
            let newY = btnRect.top + randomY;
            
            // Clamp position to keep button within viewport
            newX = Math.max(10, Math.min(newX, viewportWidth - btnWidth - 10));
            newY = Math.max(10, Math.min(newY, viewportHeight - btnHeight - 10));
            
            // Apply fixed positioning
            noBtn.style.position = 'fixed';
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        });

        // Yes button - show celebration
        yesBtn.addEventListener('click', function() {
            showCelebration();
        });

        function showCelebration() {
            // Create modal
            const modal = document.createElement('div');
            modal.className = 'modal show';
            
            const modalContent = document.createElement('div');
            modalContent.className = 'modal-content';
            
            const celebrationText = document.createElement('div');
            celebrationText.className = 'celebration-text';
            celebrationText.textContent = 'YAAYYYYY HEHE';
            
            const hearts = document.createElement('div');
            hearts.className = 'celebration-hearts';
            hearts.innerHTML = '💕 💖 💗 💓 💕 💖 💗';
            
            modalContent.appendChild(celebrationText);
            modalContent.appendChild(hearts);
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
            
            // Create confetti daisies
            createConfettiDaisies(modal);
            
            // Close modal when clicked
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
            
            // Auto-remove after 3 seconds
            setTimeout(() => {
                if (modal.parentNode) {
                    modal.remove();
                }
            }, 3000);
        }

        function createConfettiDaisies(container) {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const daisy = document.createElement('div');
                    daisy.className = 'confetti-daisy';
                    daisy.style.left = Math.random() * 80 + 10 + '%';
                    daisy.style.animationDelay = (i * 0.2) + 's';
                    
                    // Create petals
                    for (let j = 0; j < 6; j++) {
                        const petal = document.createElement('div');
                        petal.className = 'confetti-petal';
                        daisy.appendChild(petal);
                    }
                    
                    // Create center
                    const center = document.createElement('div');
                    center.className = 'confetti-center';
                    daisy.appendChild(center);
                    
                    container.appendChild(daisy);
                    
                    setTimeout(() => daisy.remove(), 3000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
